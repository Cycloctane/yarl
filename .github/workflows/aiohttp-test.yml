---

name: CI/CD


on:
  merge_group:
  push:
    branches:
    - master
    - >-
      [0-9].[0-9]+
    tags:
    - v*
  pull_request:
    branches:
    - master
    - >-
      [0-9].[0-9]+

env:
  COLOR: >-  # Supposedly, pytest or coveragepy use this
    yes
  FORCE_COLOR: 1  # Request colored output from CLI tools supporting it
  MYPY_FORCE_COLOR: 1  # MyPy's color enforcement
  PIP_DISABLE_PIP_VERSION_CHECK: 1
  PIP_NO_PYTHON_VERSION_WARNING: 1
  PIP_NO_WARN_SCRIPT_LOCATION: 1
  PRE_COMMIT_COLOR: always
  PROJECT_NAME: yarl
  PY_COLORS: 1  # Recognized by the `py` package, dependency of `pytest`
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1
  PYTHON_LATEST: 3.12

jobs:
  test-aiohttp:
    name: Test with aiohttp
    runs-on: ubuntu-latest
    steps:
    - name: Checkout aiohttp
      uses: actions/checkout@v4
      with:
        repository: aio-libs/aiohttp
        submodules: true
    - name: Checkout yarl
      uses: actions/checkout@v4
      with:
        path: vendor/yarl
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.x
        cache: pip
        cache-dependency-path: requirements/*.txt
    - name: Provision the dev env
      run: make .develop
    - name: Cythonize yarl
      working-directory: vendor/yarl
      run: make cythonize
    - name: Install yarl
      working-directory: vendor/yarl
      run: python -m pip install -e .
    - name: Ensure version
      run: python -m pip list
    - name: Run tests
      run: python -m pytest
    - name: Run dev_mode tests
      run: python -m pytest -m dev_mode

...
